name: Deploy to Netlify

# Optional. GitHub Pages is the default deploy target (deploy-ghpages.yml).
# This workflow is opt-in: it runs ONLY when manually dispatched from the
# Actions tab, and only if the repo has NETLIFY_AUTH_TOKEN and NETLIFY_SITE_ID
# secrets set. Without those secrets the job short-circuits cleanly.
#
# To enable:
#   gh secret set NETLIFY_AUTH_TOKEN --body "<token>"
#   gh secret set NETLIFY_SITE_ID --body "<site_id>"
# Then trigger: Actions → Deploy to Netlify → Run workflow
on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_NETLIFY == 'true' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('mkdocs/requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system -r mkdocs/requirements.txt

      - name: Build MkDocs
        run: mkdocs build -f mkdocs.yml -d mkdocs-site

      - name: Check Netlify credentials
        id: check
        run: |
          if [ -z "${{ secrets.NETLIFY_AUTH_TOKEN }}" ] || [ -z "${{ secrets.NETLIFY_SITE_ID }}" ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "::notice::NETLIFY_AUTH_TOKEN or NETLIFY_SITE_ID is not set — skipping Netlify deploy. Set secrets to enable; see README.md."
          else
            echo "missing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Netlify (Production)
        if: steps.check.outputs.missing == 'false'
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: mkdocs-site
          production-deploy: true
          deploy-message: "Deploy ${{ github.sha }} from ${{ github.ref_name }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
          fails-without-credentials: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5
