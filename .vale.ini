StylesPath = .vale/styles
MinAlertLevel = error
Packages = write-good, proselint
Vocab = Code

[*.md]
BasedOnStyles = Vale, write-good, proselint
Vale.Terms = NO
# Stylistic preferences that fire frequently in tutorial prose — disable at error level.
write-good.ThereIs = NO
write-good.So = NO
proselint.Very = NO
# Typography rules change literal text (... → …, (c) → ©, 4x4 → 4×4) which breaks
# code examples, quiz labels, and `rubric` column counts. Keep factual output intact.
proselint.Typography = NO
# False positive: flags "one or more absolute X" as 'more absolute' comparison.
proselint.Uncomparables = NO
