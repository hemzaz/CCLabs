###
### mkdocs-site.yml
###
docs_dir: Labs
edit_uri:
repo_name: claudecodelabs/claudecodelabs
repo_url: https://github.com/claudecodelabs/claudecodelabs
site_author: ClaudeCodeLabs authors
site_description: 30 hands-on labs for Claude Code - from zero to shipping.
site_dir: ./mkdocs-site
site_name: ClaudeCodeLabs
site_url: https://claudecodelabs.github.io/
###
### mkdocs-theme.yml
###
copyright: '&copy;2026 ClaudeCodeLabs authors &middot; Forked from <a href="https://github.com/nirgeier/GithubCopilotLabs">GithubCopilotLabs</a>'
theme:
  name: material
  custom_dir: .mkdocs-build/overrides
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - content.footer.last-updated
    - content.footer.contributors
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    #- navigation.prune        # Disabled - hides sections when tabs are off
    - navigation.sections
    #- navigation.tabs          # Disabled - left nav only
    #- navigation.tabs.sticky   # Disabled - left nav only
    #- navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate # Disabled - replaces full nav with per-page TOC in sidebar
    - toc.sticky

    #- header.autohide  # Disabled to keep top nav always visible

  # 👈 enables avatar display
  palette:
    # Dark mode only
    - scheme: slate
      primary: indigo # You can choose any color here

  font:
    text: Mulish
    code: JetBrains Mono
  favicon: assets/favicon.png
  icon:
    logo: logo
    repo: fontawesome/brands/github
    admonition:
      note: material/lightbulb
###
### mkdocs-extra.yml
###

extra:
  assets:
    - ./assets/images/
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/claudecodelabs/claudecodelabs
      name: View on GitHub

extra_css:
  - ./assets/stylesheets/codewizard.css?v=1776569250
extra_javascript:
  - https://buttons.github.io/buttons.js?v=1776569250
###
### mkdocs-plugins.yml
###

plugins:
  - awesome-pages
  - meta
  # - pdf-export:
  #     combined: true # all pages in one PDF
  #     combined_output_path: docs/Full-Documentation.pdf
  #     media_type: print
  #     verbose: true
  # Git
  #- git-authors
  - git-committers:
      branch: main
      docs_path: Labs # set if your docs folder is not root
      enabled: true
      repository: claudecodelabs/claudecodelabs
  - git-revision-date-localized:
      enable_creation_date: true
      enable_git_follow: false
      fallback_to_build_date: true
      locale: en
      timezone: UTC
      type: date
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - minify:
      minify_html: true

  # Leave this one as the last one in the list
  - print-site
  - include-markdown
###
### mkdocs-extensions.yml
###

markdown_extensions:
      - toc:
              permalink: false
              baselevel: 3
              toc_depth: 3
      - abbr
      - tables
      - admonition # For callouts/notes
      - footnotes # Footnotes support
      - attr_list # Attribute lists for elements
      - def_list # Definition lists
      - md_in_html # Markdown inside HTML blocks
      - smarty # Smart punctuation
      - meta
      - codehilite:
              guess_lang: true # Fallback code highlighting
      - pymdownx.tabbed:
              alternate_style: true
      - pymdownx.details # Collapsible details
      - pymdownx.inlinehilite # Inline code highlighting
      - pymdownx.keys # Keyboard key formatting
      - pymdownx.tasklist:
              custom_checkbox: true
      - pymdownx.betterem:
              smart_enable: all
      - pymdownx.tilde # Subscript/superscript
      - pymdownx.snippets # Snippet includes
      - pymdownx.highlight:
              anchor_linenums: true
              line_spans: __span
              pygments_lang_class: true
      - pymdownx.superfences:
              custom_fences:
                    - name: mermaid
                      class: mermaid
                      format: "!!python/name:pymdownx.superfences.fence_code_format"
      - pymdownx.emoji:
              emoji_index: !!python/name:material.extensions.emoji.twemoji
              emoji_generator: !!python/name:material.extensions.emoji.to_svg
