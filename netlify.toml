[build]
  publish = "mkdocs-site"
  command = "pip install uv && uv pip install --system -r mkdocs/requirements.txt && mkdocs build -f mkdocs.yml -d mkdocs-site"

[build.environment]
  PYTHON_VERSION = "3.11"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
